<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pontos de atenção e ocorrências</title>
    <meta name="theme-color" content="#0f766e">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css?v=18">
  </head>
  <body class="modern-home">
    <main class="home-shell">
      <section class="home-card" aria-labelledby="page-title">
        <header class="home-hero">
          <div class="home-hero-text">
            <h1 id="page-title">Pontos de atenção e ocorrências</h1>
            <p class="home-subtitle">Registre rapidamente uma situação, direcione ao responsável e anexe uma foto quando necessário.</p>
          </div>
          <div class="home-protocol" aria-label="Protocolo gerado">
            <strong id="protocolNumber">OS-1</strong>
            <a class="admin-link protocol-admin-link" href="login.html">Abrir painel administrativo</a>
          </div>
        </header>

        <div class="home-body">
          <div class="home-meta-grid">
            <div class="home-meta-card">
              <span>Emissão automática</span>
              <strong id="issuedAtLabel">-</strong>
            </div>
            <div class="home-meta-card">
              <span>Status inicial</span>
              <strong>Nova ocorrência</strong>
            </div>
          </div>

          <form id="serviceForm" class="home-form">
            <section class="home-section">
              <div class="home-grid">
                <label>
                  <span>Quem está sendo notificado</span>
                  <input id="recipient" name="recipient" type="text" required>
                </label>
                <label>
                  <span>Quem notificou</span>
                  <input id="issuer" name="issuer" type="text" required>
                </label>
                <label>
                  <span>Nº do apartamento ou local</span>
                  <input id="room" name="room" type="text" required>
                </label>
                <label>
                  <span>Grau de impacto</span>
                  <input id="urgency" name="urgency" type="hidden" value="Média" required>
                  <div class="segmented-control" role="group" aria-label="Grau de impacto">
                    <button type="button" data-urgency="Ótimo">Ótimo</button>
                    <button type="button" data-urgency="Baixa">Baixa</button>
                    <button class="active" type="button" data-urgency="Média">Média</button>
                    <button type="button" data-urgency="Alta">Alta</button>
                  </div>
                </label>
              </div>
            </section>

            <section class="home-section">
              <label>
                <span>Descrição do ocorrido</span>
                <textarea id="description" name="description" rows="6" placeholder="Descreva o ocorrido, local exato e outras informações pertinentes." required></textarea>
              </label>
            </section>

            <section class="photo-zone">
              <input id="photo" class="photo-input" name="photo" type="file" accept="image/*" capture="environment">
              <video id="cameraView" autoplay playsinline muted></video>
              <canvas id="cameraCanvas" hidden></canvas>
              <div class="photo-head">
                <div>
                  <p class="eyebrow">Foto do problema</p>
                  <strong>Anexe uma evidência visual</strong>
                </div>
                <div class="camera-actions">
                  <button class="secondary" type="button" id="openCameraButton">Abrir câmera</button>
                  <button class="secondary" type="button" id="uploadPhotoButton">Carregar foto do dispositivo</button>
                  <button type="button" id="captureButton" hidden>Capturar foto</button>
                  <button class="secondary" type="button" id="closeCameraButton" hidden>Fechar câmera</button>
                  <button class="danger" type="button" id="removePhotoButton" hidden>Remover</button>
                </div>
              </div>
              <p id="cameraMessage" class="camera-message"></p>
              <figure class="photo-box">
                <img id="photoPreview" alt="Foto anexada do problema">
                <figcaption id="photoCaption">Prévia da foto capturada ou anexada</figcaption>
              </figure>
            </section>

            <div class="actions">
              <button class="secondary" type="reset">Limpar</button>
              <button type="submit">Registrar ocorrência</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="data-store.js"></script>
    <script src="app.js"></script>
    <script src="pwa.js"></script>
  </body>
</html>

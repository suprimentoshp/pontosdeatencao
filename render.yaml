services:
  - type: web
    name: pontosdeatencao
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pontosdeatencao-db
          property: connectionString

databases:
  - name: pontosdeatencao-db
    databaseName: pontosdeatencao
    user: pontosdeatencao
